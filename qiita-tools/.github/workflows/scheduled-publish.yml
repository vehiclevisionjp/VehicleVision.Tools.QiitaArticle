# 予約投稿用 workflow
# 記事の Front Matter に scheduled_publish: "YYYY-MM-DD" を追加し、
# ignorePublish: true に設定しておくと、指定日に自動投稿されます。
name: Scheduled Publish

on:
  schedule:
    - cron: '0 0,9 * * *'  # 毎日 JST 9:00/18:00 (UTC 0:00/9:00)
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  scheduled_publish:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      TZ: Asia/Tokyo
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install qiita-cli
        run: npm install -g @qiita/qiita-cli@v1.8.0

      - name: Check and enable scheduled articles
        id: check
        run: |
          TODAY=$(TZ=Asia/Tokyo date +%Y-%m-%d)
          echo "Today (JST): $TODAY"
          CHANGED=false
          ENABLED_FILES=""
          while IFS= read -r file; do
            [ -f "$file" ] || continue
            SCHEDULED=$(grep -oP '(?<=scheduled_publish:\s)["\x27]?\K[0-9]{4}-[0-9]{2}-[0-9]{2}' "$file" 2>/dev/null || echo "")
            if [ -z "$SCHEDULED" ]; then
              continue
            fi
            if [[ ! "$SCHEDULED" > "$TODAY" ]]; then
              if grep -q 'ignorePublish: true' "$file"; then
                sed -i 's/ignorePublish: true/ignorePublish: false/' "$file"
                sed -i '/scheduled_publish:/d' "$file"
                echo "Enabled: $file (scheduled: $SCHEDULED)"
                ENABLED_FILES="${ENABLED_FILES}${file}\n"
                CHANGED=true
              fi
            else
                echo "Pending: $file (scheduled: $SCHEDULED)"
            fi
          done < <(find public -name '*.md' -not -path 'public/.remote/*')
          echo "changed=$CHANGED" >> $GITHUB_OUTPUT
          echo "enabled_files<<EOF" >> $GITHUB_OUTPUT
          echo -e "$ENABLED_FILES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Commit and push changes
        if: steps.check.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          BRANCH="${{ github.ref_name }}"
          MAX_RETRIES=3

          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          # Backup public/ for retry/rollback
          rm -rf /tmp/public_backup
          if [ -d public ]; then
            cp -r public/ /tmp/public_backup/
          fi

          git commit -m "Enable scheduled articles [skip ci]"

          for i in $(seq 1 $MAX_RETRIES); do
            if git push; then
              echo "✅ Push succeeded (attempt $i)"
              exit 0
            fi
            echo "⚠️ Push failed (attempt $i/$MAX_RETRIES)"

            if [ "$i" -eq "$MAX_RETRIES" ]; then
              echo "❌ All retries exhausted — rolling back commit"
              git reset --hard HEAD~1
              exit 1
            fi

            # Rollback: reset, fetch latest, restore from backup
            git reset --hard HEAD~1
            git fetch origin "$BRANCH"
            git reset --hard "origin/$BRANCH"
            if [ -d /tmp/public_backup ]; then
              cp -r /tmp/public_backup/* public/ 2>/dev/null || true
            fi

            git add -A
            if git diff --cached --quiet; then
              echo "No diff remaining after merge"
              exit 0
            fi
            git commit -m "Enable scheduled articles [skip ci]"

            sleep $((i * 5))
          done

      - name: Publish articles
        if: steps.check.outputs.changed == 'true'
        env:
          QIITA_TOKEN: ${{ secrets.QIITA_TOKEN }}
        run: qiita publish --all

      - name: Commit and push publish results
        if: steps.check.outputs.changed == 'true'
        run: |
          BRANCH="${{ github.ref_name }}"
          MAX_RETRIES=3

          git add -A
          if git diff --cached --quiet; then
            echo "No changes from publish"
            exit 0
          fi

          # Backup public/ for retry/rollback
          rm -rf /tmp/public_backup
          if [ -d public ]; then
            cp -r public/ /tmp/public_backup/
          fi

          git commit -m "Publish articles via qiita-cli"

          for i in $(seq 1 $MAX_RETRIES); do
            if git push; then
              echo "✅ Push succeeded (attempt $i)"
              exit 0
            fi
            echo "⚠️ Push failed (attempt $i/$MAX_RETRIES)"

            if [ "$i" -eq "$MAX_RETRIES" ]; then
              echo "❌ All retries exhausted — rolling back commit"
              git reset --hard HEAD~1
              exit 1
            fi

            git reset --hard HEAD~1
            git fetch origin "$BRANCH"
            git reset --hard "origin/$BRANCH"
            if [ -d /tmp/public_backup ]; then
              cp -r /tmp/public_backup/* public/ 2>/dev/null || true
            fi

            git add -A
            if git diff --cached --quiet; then
              echo "No diff remaining after merge"
              exit 0
            fi
            git commit -m "Publish articles via qiita-cli"

            sleep $((i * 5))
          done

      - name: Add created_at to Front Matter
        if: steps.check.outputs.changed == 'true'
        env:
          QIITA_TOKEN: ${{ secrets.QIITA_TOKEN }}
        run: |
          CHANGED=false
          while IFS= read -r file; do
            [ -z "$file" ] && continue
            [ -f "$file" ] || continue
            ARTICLE_ID=$(grep -oP '(?<=^id: ).*' "$file" | tr -d '"' | tr -d "'")
            [ -z "$ARTICLE_ID" ] && continue
            [ "$ARTICLE_ID" = "null" ] && continue
            if grep -q '^created_at:' "$file"; then
              continue
            fi
            CREATED_AT=$(curl -s -H "Authorization: Bearer $QIITA_TOKEN" \
              "https://qiita.com/api/v2/items/$ARTICLE_ID" | \
              python3 -c "import sys,json; print(json.load(sys.stdin).get('created_at',''))" 2>/dev/null || echo "")
            if [ -n "$CREATED_AT" ]; then
              sed -i "/^updated_at:/a created_at: '$CREATED_AT'" "$file"
              echo "Added created_at to $file: $CREATED_AT"
              CHANGED=true
            fi
            sleep 1
          done < <(echo -e "${{ steps.check.outputs.enabled_files }}")
          if [ "$CHANGED" = true ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"

            BRANCH="${{ github.ref_name }}"
            MAX_RETRIES=3

            git add -A
            if git diff --cached --quiet; then
              exit 0
            fi

            # Backup public/ for retry/rollback
            rm -rf /tmp/public_backup
            if [ -d public ]; then
              cp -r public/ /tmp/public_backup/
            fi

            git commit -m "Add created_at to Front Matter [skip ci]"

            for i in $(seq 1 $MAX_RETRIES); do
              if git push; then
                echo "✅ Push succeeded (attempt $i)"
                exit 0
              fi
              echo "⚠️ Push failed (attempt $i/$MAX_RETRIES)"

              if [ "$i" -eq "$MAX_RETRIES" ]; then
                echo "❌ All retries exhausted — rolling back commit"
                git reset --hard HEAD~1
                exit 1
              fi

              git reset --hard HEAD~1
              git fetch origin "$BRANCH"
              git reset --hard "origin/$BRANCH"
              if [ -d /tmp/public_backup ]; then
                cp -r /tmp/public_backup/* public/ 2>/dev/null || true
              fi

              git add -A
              if git diff --cached --quiet; then
                echo "No diff remaining after merge"
                exit 0
              fi
              git commit -m "Add created_at to Front Matter [skip ci]"

              sleep $((i * 5))
            done
          fi

      - name: Build notification message
        id: articles
        run: |
          TODAY=$(TZ=Asia/Tokyo date +%Y-%m-%d)
          PUBLISHED=""
          if [ "${{ steps.check.outputs.changed }}" == "true" ]; then
            while IFS= read -r file; do
              [ -z "$file" ] && continue
              [ -f "$file" ] || continue
              ARTICLE_ID=$(grep -oP '(?<=^id: ).*' "$file" | tr -d '"' | tr -d "'")
              ARTICLE_TITLE=$(grep -oP '(?<=^title: ).*' "$file" | tr -d '"' | tr -d "'")
              if [ -n "$ARTICLE_ID" ] && [ -n "$ARTICLE_TITLE" ]; then
                PUBLISHED="${PUBLISHED}▶ ${ARTICLE_TITLE}\nhttps://qiita.com/items/${ARTICLE_ID}\n"
              fi
            done < <(echo -e "${{ steps.check.outputs.enabled_files }}")
          fi
          UPCOMING=""
          while IFS= read -r file; do
            [ -f "$file" ] || continue
            SCHEDULED=$(grep -oP '(?<=scheduled_publish:\s)["\x27]?\K[0-9]{4}-[0-9]{2}-[0-9]{2}' "$file" 2>/dev/null || echo "")
            if [[ -n "$SCHEDULED" && "$SCHEDULED" > "$TODAY" ]]; then
              ARTICLE_TITLE=$(grep -oP '(?<=^title: ).*' "$file" | tr -d '"' | tr -d "'")
              if [ -n "$ARTICLE_TITLE" ]; then
                UPCOMING="${UPCOMING}${SCHEDULED} - ${ARTICLE_TITLE}\n"
              fi
            fi
          done < <(find public -name '*.md' -not -path 'public/.remote/*')
          MESSAGE="📝 Qiita 予約投稿レポート ($TODAY)\n\n"
          if [ -n "$PUBLISHED" ]; then
            MESSAGE="${MESSAGE}【本日投稿】\n${PUBLISHED}\n"
          else
            MESSAGE="${MESSAGE}【本日投稿】\n今日の投稿予定はありません\n\n"
          fi
          if [ -n "$UPCOMING" ]; then
            MESSAGE="${MESSAGE}【今後の予定】\n${UPCOMING}"
          else
            MESSAGE="${MESSAGE}【今後の予定】\n予約投稿の予定はありません"
          fi
          echo "message<<EOF" >> $GITHUB_OUTPUT
          echo -e "$MESSAGE" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      # ── 通知（任意） ──────────────────────────────────────
      # 必要に応じていずれかのコメントを外し、対応する Secret を設定してください。
      #
      # --- Chatwork ---
      # - name: Notify Chatwork
      #   env:
      #     CHATWORK_API_TOKEN: ${{ secrets.CHATWORK_API_TOKEN }}
      #     CHATWORK_ROOM_ID: ${{ secrets.CHATWORK_ROOM_ID }}
      #   run: |
      #     curl -X POST "https://api.chatwork.com/v2/rooms/${CHATWORK_ROOM_ID}/messages" \
      #       -H "X-ChatWorkToken: ${CHATWORK_API_TOKEN}" \
      #       --data-urlencode "body=${{ steps.articles.outputs.message }}"
