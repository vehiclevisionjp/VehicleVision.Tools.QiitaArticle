# Please set 'QIITA_TOKEN' secret to your repository
name: Publish articles

on:
  push:
    branches:
      - main
      - master
    paths:
      - 'public/**'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish_articles:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Install qiita-cli
        run: npm install -g @qiita/qiita-cli@v1.8.0

      - name: Publish articles
        env:
          QIITA_TOKEN: ${{ secrets.QIITA_TOKEN }}
        run: qiita publish --all

      - name: Commit and push publish results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          BRANCH="${{ github.ref_name }}"
          MAX_RETRIES=3

          git add -A
          if git diff --cached --quiet; then
            echo "No changes from publish"
            exit 0
          fi

          # Backup public/ for retry/rollback
          rm -rf /tmp/public_backup
          if [ -d public ]; then
            cp -r public/ /tmp/public_backup/
          fi

          git commit -m "Publish articles via qiita-cli"

          for i in $(seq 1 $MAX_RETRIES); do
            if git push; then
              echo "✅ Push succeeded (attempt $i)"
              exit 0
            fi
            echo "⚠️ Push failed (attempt $i/$MAX_RETRIES)"

            if [ "$i" -eq "$MAX_RETRIES" ]; then
              echo "❌ All retries exhausted — rolling back commit"
              git reset --hard HEAD~1
              exit 1
            fi

            # Rollback: reset, fetch latest, restore from backup
            git reset --hard HEAD~1
            git fetch origin "$BRANCH"
            git reset --hard "origin/$BRANCH"
            if [ -d /tmp/public_backup ]; then
              cp -r /tmp/public_backup/* public/ 2>/dev/null || true
            fi

            git add -A
            if git diff --cached --quiet; then
              echo "No diff remaining after merge"
              exit 0
            fi
            git commit -m "Publish articles via qiita-cli"

            sleep $((i * 5))
          done

      - name: Add created_at to Front Matter
        env:
          QIITA_TOKEN: ${{ secrets.QIITA_TOKEN }}
        run: |
          CHANGED=false
          while IFS= read -r file; do
            [ -f "$file" ] || continue
            ARTICLE_ID=$(grep -oP '(?<=^id: ).*' "$file" | tr -d '"' | tr -d "'")
            [ -z "$ARTICLE_ID" ] && continue
            [ "$ARTICLE_ID" = "null" ] && continue
            if grep -q '^created_at:' "$file"; then
              continue
            fi
            CREATED_AT=$(curl -s -H "Authorization: Bearer $QIITA_TOKEN" \
              "https://qiita.com/api/v2/items/$ARTICLE_ID" | \
              python3 -c "import sys,json; print(json.load(sys.stdin).get('created_at',''))" 2>/dev/null || echo "")
            if [ -n "$CREATED_AT" ]; then
              sed -i "/^updated_at:/a created_at: '$CREATED_AT'" "$file"
              echo "Added created_at to $file: $CREATED_AT"
              CHANGED=true
            fi
            sleep 1
          done < <(find public -name '*.md' -not -path 'public/.remote/*' | sort)

          if [ "$CHANGED" = true ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"

            BRANCH="${{ github.ref_name }}"
            MAX_RETRIES=3

            git add -A
            if git diff --cached --quiet; then
              exit 0
            fi

            # Backup public/ for retry/rollback
            rm -rf /tmp/public_backup
            if [ -d public ]; then
              cp -r public/ /tmp/public_backup/
            fi

            git commit -m "Add created_at to Front Matter [skip ci]"

            for i in $(seq 1 $MAX_RETRIES); do
              if git push; then
                echo "✅ Push succeeded (attempt $i)"
                exit 0
              fi
              echo "⚠️ Push failed (attempt $i/$MAX_RETRIES)"

              if [ "$i" -eq "$MAX_RETRIES" ]; then
                echo "❌ All retries exhausted — rolling back commit"
                git reset --hard HEAD~1
                exit 1
              fi

              git reset --hard HEAD~1
              git fetch origin "$BRANCH"
              git reset --hard "origin/$BRANCH"
              if [ -d /tmp/public_backup ]; then
                cp -r /tmp/public_backup/* public/ 2>/dev/null || true
              fi

              git add -A
              if git diff --cached --quiet; then
                echo "No diff remaining after merge"
                exit 0
              fi
              git commit -m "Add created_at to Front Matter [skip ci]"

              sleep $((i * 5))
            done
          fi

      - name: Get published articles info
        id: articles
        run: |
          BEFORE="${{ github.event.before }}"
          AFTER="${{ github.sha }}"
          if [ -z "$BEFORE" ] || [ "$BEFORE" = "0000000000000000000000000000000000000000" ]; then
            CHANGED_FILES=$(git diff --name-only "${AFTER}~1" "${AFTER}" -- 'public/**/*.md' ':!public/.remote/**' 2>/dev/null || echo "")
          else
            CHANGED_FILES=$(git diff --name-only "${BEFORE}" "${AFTER}" -- 'public/**/*.md' ':!public/.remote/**' 2>/dev/null || echo "")
          fi
          if [ -z "$CHANGED_FILES" ]; then
            echo "message=" >> $GITHUB_OUTPUT
            exit 0
          fi
          MESSAGE="📝 Qiita記事が投稿されました\n\n"
          while IFS= read -r file; do
            [ -f "$file" ] || continue
            if grep -q 'ignorePublish: true' "$file"; then
              continue
            fi
            ARTICLE_ID=$(grep -oP '(?<=^id: ).*' "$file" | tr -d '"' | tr -d "'")
            [ "$ARTICLE_ID" = "null" ] && continue
            ARTICLE_TITLE=$(grep -oP '(?<=^title: ).*' "$file" | tr -d '"' | tr -d "'")
            if [ -n "$ARTICLE_ID" ] && [ -n "$ARTICLE_TITLE" ]; then
              MESSAGE="${MESSAGE}▶ ${ARTICLE_TITLE}\nhttps://qiita.com/items/${ARTICLE_ID}\n\n"
            fi
          done < <(echo "$CHANGED_FILES")
          if [[ "$MESSAGE" == *"qiita.com"* ]]; then
            echo "message<<EOF" >> $GITHUB_OUTPUT
            echo -e "$MESSAGE" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          else
            echo "message=" >> $GITHUB_OUTPUT
          fi

      # ── 通知（任意） ──────────────────────────────────────
