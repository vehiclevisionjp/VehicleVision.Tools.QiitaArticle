      # - name: Notify Teams
      #   if: steps.articles.outputs.message != ''
      #   env:
      #     TEAMS_WEBHOOK_URL: ${{ secrets.TEAMS_WEBHOOK_URL }}
      #   run: |
      #     curl -X POST "$TEAMS_WEBHOOK_URL" \
      #       -H "Content-Type: application/json" \
      #       -d "{\"text\": \"${{ steps.articles.outputs.message }}\"}"
