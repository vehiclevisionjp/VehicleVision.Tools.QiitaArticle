# リリースワークフロー
# workflow_dispatch でバージョンをインクリメントし、VS Code 拡張 VSIX とツール ZIP を
# 自動ビルドして GitHub Releases に登録します。
name: Create Release

on:
  workflow_dispatch:
    inputs:
      version_type:
        description: 'バージョンアップの種類'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch # 0.0.0 → 0.0.1
          - minor # 0.0.0 → 0.1.0
          - major # 0.0.0 → 1.0.0

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v6
        with:
          node-version: '24'

      # ── バージョン取得・計算 ────────────────────────────────
      - name: Bump version
        id: new_version
        run: |
          npm version ${{ github.event.inputs.version_type }} --no-git-tag-version
          NEW_VERSION=$(node -p "require('./package.json').version")
          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "New version: $NEW_VERSION"

      # ── 拡張機能の package.json バージョンをリリースと統一 ──
      - name: Sync extension versions
        run: |
          NEW_VERSION="${{ steps.new_version.outputs.new_version }}"
          for pkg in extensions/calendar/package.json extensions/markdown-preview/package.json; do
            node -e "
              const fs = require('fs');
              const raw = fs.readFileSync('$pkg', 'utf8');
              const obj = JSON.parse(raw);
              obj.version = process.argv[1];
              fs.writeFileSync('$pkg', JSON.stringify(obj, null, 2) + '\n');
            " "$NEW_VERSION"
          done

      # ── Calendar 拡張のビルド ──────────────────────────────
      - name: Build Calendar extension
        working-directory: extensions/calendar
        run: |
          npm install
          npm run build
          npx --yes @vscode/vsce package --no-dependencies \
            -o VehicleVision.Tools.QiitaArticle.Calendar.vsix

      # ── MarkdownPreview 拡張のビルド ──────────────────────
      - name: Build MarkdownPreview extension
        working-directory: extensions/markdown-preview
        run: |
          npm install
          npm run build
          npx --yes @vscode/vsce package --no-dependencies \
            -o VehicleVision.Tools.QiitaArticle.MarkdownPreview.vsix

      # ── lint/ツールファイルを ZIP にまとめる ──────────────
      - name: Package lint tools
        run: |
          cd qiita-tools
          zip -r ../qiita-tools.zip .

      # ── VS Code Marketplace へ公開 ────────────────────────
      - name: Publish to VS Code Marketplace
        if: vars.VSCE_PUBLISH == 'true'
        run: |
          npx --yes @vscode/vsce publish \
            --packagePath extensions/calendar/VehicleVision.Tools.QiitaArticle.Calendar.vsix
          npx --yes @vscode/vsce publish \
            --packagePath extensions/markdown-preview/VehicleVision.Tools.QiitaArticle.MarkdownPreview.vsix
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}

      # ── バージョンコミット・タグ作成 ────────────────────────
      - name: Commit version update and create tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json extensions/calendar/package.json extensions/markdown-preview/package.json
          git commit -m "chore: bump version to v${{ steps.new_version.outputs.new_version }}"
          git tag "v${{ steps.new_version.outputs.new_version }}"
          git push origin HEAD "v${{ steps.new_version.outputs.new_version }}"

      # ── GitHub Release を作成してアセットをアップロード ───
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.new_version.outputs.new_version }}
          name: v${{ steps.new_version.outputs.new_version }}
          generate_release_notes: true
          files: |
            extensions/calendar/VehicleVision.Tools.QiitaArticle.Calendar.vsix
            extensions/markdown-preview/VehicleVision.Tools.QiitaArticle.MarkdownPreview.vsix
            qiita-tools.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
